let h='<div class="metrics-grid"><div class="metric-card" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff"><div style="font-size:28px;font-weight:700">'+F.length+'</div><div style="font-size:12px;opacity:.8">HUN 관련 전체</div></div><div class="metric-card" style="background:linear-gradient(135deg,#fa709a,#fee140);color:#fff"><div style="font-size:28px;font-weight:700">'+act.length+'</div><div style="font-size:12px;opacity:.8">미해결</div></div><div class="metric-card" style="background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff"><div style="font-size:28px;font-weight:700">'+vfy.length+'</div><div style="font-size:12px;opacity:.8">검증중</div></div><div class="metric-card" style="background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff"><div style="font-size:28px;font-weight:700">'+cls.length+'</div><div style="font-size:12px;opacity:.8">종료 ('+(cls.length/F.length*100).toFixed(0)+'%)</div></div><div class="metric-card" style="background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff"><div style="font-size:28px;font-weight:700">'+sev.length+'</div><div style="font-size:12px;opacity:.8">치명/심각</div></div><div class="metric-card" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb);color:#fff"><div style="font-size:28px;font-weight:700">'+vK.length+'</div><div style="font-size:12px;opacity:.8">合入版本</div></div></div>';
h+='<div class="card"><div class="card-title">📊 版本별 현황</div><div class="tw"><table><tr><th>合入版本</th><th>Total</th><th>미해결</th><th>검증중</th><th>종료</th><th>完成率</th><th>치명/심각</th></tr>'+vK.slice(0,25).map(k=>{const a=vC[k];const ac=F.filter(b=>(b.version_fix||'미지정')===k&&act.includes(b)).length;const vv=F.filter(b=>(b.version_fix||'미지정')===k&&vfy.includes(b)).length;const cl=F.filter(b=>(b.version_fix||'미지정')===k&&b.status==='closed').length;const r=a?Math.round((vv+cl)/a*100):100;const svv=F.filter(b=>(b.version_fix||'미지정')===k&&sev.includes(b)).length;return'<tr style="'+(ac?'background:#fff5f5':r>=100?'background:#f0fff4':'')+'"><td>'+k+'</td><td>'+a+'</td><td style="color:'+(ac?'#dc3545':'#999')+'">'+(ac||'-')+'</td><td>'+(vv||'-')+'</td><td>'+(cl||'-')+'</td><td><strong>'+r+'%</strong></td><td style="color:'+(svv?'#dc3545':'#999')+'">'+(svv||'-')+'</td></tr>'}).join('')+'</table></div></div>';
h+='<div class="card"><div class="card-title">🔴 미해결 Bug ('+act.length+')</div><div class="tw">'+(act.length?tbl(act):'<div style="padding:16px;text-align:center;color:#999">✅ 없음</div>')+'</div></div>';
h+='<div class="card"><div class="card-title">⚠️ 치명/심각 Bug ('+sev.length+'건, 미해결 '+sevA.length+')</div><div class="tw">'+(sev.length?tbl(sev):'<div style="padding:16px;text-align:center;color:#999">없음</div>')+'</div></div>';
h+='<div class="card"><div class="card-title">⏳ 해결/검증 대기 ('+vfy.length+')</div><div class="tw">'+(vfy.length?tbl(vfy):'<div style="padding:16px;text-align:center;color:#999">없음</div>')+'</div></div>';
h+='<div class="card"><div class="card-title">📋 로컬라이징 Bug 목록 (24건 · 누적 이력)</div><div class="tw"><table><tr><th>ID</th><th>标题</th><th>严重</th><th>状态</th><th>合入版本</th><th>HR</th><th>确认</th></tr>'+EXCEL.map(x=>{return'<tr><td>'+(x.i||'').slice(-7)+'</td><td><a href="'+x.l+'" target="_blank">'+esc(x.t)+'</a></td><td><span class="tg '+(x.s==='致命'?'sf':x.s==='严重'?'ss':'sn')+'">'+x.s+'</span></td><td><span class="tg '+(x.st==='新'?'tn':x.st==='已解决'?'tp':'tc')+'">'+x.st+'</span></td><td>'+x.v+'</td><td>'+x.hr+'</td><td>'+x.m+'</td></tr>'}).join('')+'</table></div></div>';
document.getElementById('ct').innerHTML=h;
drawCharts(F);
}
function tbl(items){
const bgMap=JSON.parse(localStorage.getItem('tapd_bigo')||'{}');
const limit=80;const show=items.slice(0,limit);
const more=items.length>limit?'<tr><td colspan="8" style="text-align:center;color:#999;padding:8px">... '+(items.length-limit)+'건 더 있음</td></tr>':'';
return'<table><tr><th>ID</th><th>제목</th><th>상태</th><th>심각도</th><th>发现版本</th><th>合入版本</th><th>생성일</th><th>비고</th></tr>'+show.map(b=>{const id=b.id||'';const lk='https://www.tapd.cn/46691872/bugtrace/bugs/view?bug_id='+id;const st=(b.status||'').toLowerCase();const sr=(b.severity||'').toLowerCase();const cls=st==='new'?'style="background:#fff5f5"':'';const bgVal=(bgMap[id]||'').replace(/"/g,'&quot;');return'<tr '+cls+'><td>'+id.slice(-7)+'</td><td><a href="'+lk+'" target="_blank">'+esc((b.title||'').substring(0,45))+'</a></td><td><span class="tg '+(st==='new'?'tn':st==='in_progress'||st==='reopened'?'tp':'tc')+'">'+(b.status||'-')+'</span></td><td><span class="tg '+(sr.includes('fatal')||sr.includes('critical')?'sf':sr.includes('serious')||sr.includes('major')?'ss':'sn')+'">'+(b.severity||'-')+'</span></td><td>'+(b.version_report||'-')+'</td><td>'+(b.version_fix||'-')+'</td><td>'+(b.created||'').substring(0,10)+'</td><td><input class="bg-input" data-id="'+id+'" placeholder="-" onchange="saveBg(this.dataset.id,this.value)" value="'+bgVal+'"></td></tr>'}).join('')+more+'</table>'
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function saveBg(id,v){try{const m=JSON.parse(localStorage.getItem('tapd_bigo')||'{}');if(v)m[id]=v;else delete m[id];localStorage.setItem('tapd_bigo',JSON.stringify(m))}catch(e){}}
function drawCharts(F){
if(typeof Chart==='undefined')return;
// Daily trend
const last30=[];const now=new Date();
for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);last30.push(d.toISOString().substring(0,10))}
const dayData={};last30.forEach(d=>{dayData[d]={total:0,active:0,closed:0}});
F.forEach(b=>{const c=(b.created||'').substring(0,10);if(dayData[c]){dayData[c].total++;const st=(b.status||'').toLowerCase();if(st==='new'||st==='in_progress'||st==='reopened')dayData[c].active++;if(st==='closed')dayData[c].closed++}});
const labels=last30.map(d=>{const m=d.substring(5,7);const day=d.substring(8,10);return m+'/'+day});
const totals=last30.map(d=>dayData[d].total);
const actives=last30.map(d=>dayData[d].active);
const closeds=last30.map(d=>dayData[d].closed);
var ctx1=document.getElementById('dailyTrend');if(ctx1){if(window._dtChart)window._dtChart.destroy();window._dtChart=new Chart(ctx1,{type:'bar',data:{labels:labels,datasets:[{label:'신규',data:totals,backgroundColor:'rgba(102,126,234,.6)',borderColor:'#667eea',borderWidth:.5,borderRadius:2},{label:'미해결',data:actives,backgroundColor:'rgba(250,112,154,.6)',borderColor:'#fa709a',borderWidth:.5,borderRadius:2},{label:'종료',data:closeds,backgroundColor:'rgba(17,153,142,.6)',borderColor:'#11998e',borderWidth:.5,borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10,family:'Noto Sans KR'},boxWidth:12,usePointStyle:true}}},scales:{x:{grid:{display:false},ticks:{font:{size:8,family:'Noto Sans KR'},maxRotation:60,minRotation:60}},y:{beginAtZero:true,ticks:{font:{size:9,family:'Noto Sans KR'},stepSize:1}}}}})}
// Status distribution
var stCnt={};F.forEach(b=>{const s=(b.status||'').toLowerCase();stCnt[s]=(stCnt[s]||0)+1});
var sKl={new:'신규',in_progress:'진행중',reopened:'재오픈',resolved:'해결됨',verified:'검증완료',rejected:'반려',suspended:'보류',closed:'종료'};
var stLabels=[],stValues=[];Object.entries(stCnt).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{stLabels.push(sKl[k]||k);stValues.push(v)});
var ctx2=document.getElementById('statusDist');if(ctx2){if(window._stChart)window._stChart.destroy();window._stChart=new Chart(ctx2,{type:'doughnut',data:{labels:stLabels,datasets:[{data:stValues,backgroundColor:['#667eea','#fa709a','#f093fb','#4facfe','#11998e','#fbc2eb','#fee140','#a18cd1'],borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:9,family:'Noto Sans KR'},boxWidth:10,usePointStyle:true,padding:6}}},cutout:'50%'}})}
// Severity distribution
var svCnt={};F.forEach(b=>{const se=(b.severity||'').toLowerCase();if(se.includes('fatal')||se.includes('critical'))svCnt['치명']=(svCnt['치명']||0)+1;else if(se.includes('serious')||se.includes('major'))svCnt['심각']=(svCnt['심각']||0)+1;else svCnt['일반']=(svCnt['일반']||0)+1});
var svLabels=Object.keys(svCnt);var svValues=Object.values(svCnt);
var ctx3=document.getElementById('severeDist');if(ctx3){if(window._svChart)window._svChart.destroy();window._svChart=new Chart(ctx3,{type:'doughnut',data:{labels:svLabels,datasets:[{data:svValues,backgroundColor:['#dc3545','#fd7e14','#6c757d'],borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:9,family:'Noto Sans KR'},boxWidth:10,usePointStyle:true,padding:6}}},cutout:'50%'}})}
}
function detCh(){
if(FT){PREV={};HB.forEach(b=>{PREV[b.id]=b.status||''});FT=false;return}
const ts=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const nn=[];const cm={};HB.forEach(b=>cm[b.id]=b);
Object.entries(PREV).forEach(([id,os])=>{const b=cm[id];if(!b){nn.push({t:ts,ty:'stat',bug:id,title:'(제거)',detail:'HUN 연관 해제됨'});return}if(b.status!==os&&os){nn.push({t:ts,ty:'chg',bug:id,title:(b.title||'').substring(0,30),detail:'상태: '+os+' → '+(b.status||'-'),link:'https://www.tapd.cn/46691872/bugtrace/bugs/view?bug_id='+id})}});
Object.entries(cm).forEach(([id,b])=>{if(!PREV[id]){nn.push({t:ts,ty:'new',bug:id,title:(b.title||'').substring(0,30),detail:'🆕 HUN에 새로 할당',link:'https://www.tapd.cn/46691872/bugtrace/bugs/view?bug_id='+id})}});
PREV={};HB.forEach(b=>{PREV[b.id]=b.status||''});
if(nn.length){NOTIFS=[...nn,...NOTIFS].slice(0,50);pushNotif();document.getElementById('d').style.display='block'}
}
function pushNotif(){
const el=document.getElementById('ntL');if(!NOTIFS.length){el.innerHTML='<div class="nt-empty">✅ 최근 변경 없음</div>';return}
const gr={};NOTIFS.forEach(n=>{if(!gr[n.t])gr[n.t]=[];gr[n.t].push(n)});
let html='';Object.entries(gr).forEach(([t,its])=>{html+='<div style="margin-bottom:10px"><div style="font-size:10px;color:#999;margin-bottom:3px">'+t+'</div>';its.forEach(n=>{html+='<div class="nt-item n-'+n.ty+'"><div><b>'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.bug.slice(-7)+'</a>':n.bug.slice(-7))+'</b> '+n.title+'</div><div style="font-size:10px;color:#666">'+n.detail+'</div></div>'});html+='</div>'});
el.innerHTML=html;document.getElementById('ntT').textContent='마지막 확인: '+new Date().toLocaleTimeString('ko-KR')+' (3시간)';
}
function tN(){NO=!NO;document.getElementById('p').classList.toggle('open',NO);document.getElementById('d').style.display='none'}
async function manualRefresh(){const rs=document.getElementById('rs');rs.textContent='상태: TAPD 갱신 중...';try{const r=await fetch('/api/refresh');if(r.ok){rs.textContent='✅ 완료 ('+new Date().toLocaleTimeString('ko-KR')+')';setTimeout(()=>{rs.textContent='마지막: '+new Date().toLocaleTimeString('ko-KR')},4000);FT=true;ld()}else{rs.textContent='❌ 실패'}}catch(e){rs.textContent='❌ 오류: '+e.message}}
let sec=10800;setInterval(()=>{sec--;if(sec<=0){sec=10800;ld()}},1000);
ld();
</script></body></html>
